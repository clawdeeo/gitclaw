[package]
name = "gitclaw"
version = "0.1.0"
edition = "2021"
description = "Install software from GitHub releases"
license = "MIT"

[[bin]]
name = "gitclaw"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive", "env"] }
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
thiserror = "2"
anyhow = "1"
color-eyre = "0.6"
indicatif = "0.17"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tar = "0.4"
flate2 = "1"
zip = "1"
bzip2 = "0.5"
xz2 = "0.1"
walkdir = "2"
chrono = { version = "0.4", features = ["serde"] }
futures = "0.3"
dirs = "6"

[dev-dependencies]
tempfile = "3"
assert_cmd = "2"
predicates = "3"
